    <body>

                <!-- Add mobile menu -->

            <main>
                <!-- Add FORM -->
                <form id="email_form" name="email_form" action="form.html" method="GET" enctype="multipart/form-data">
                    <h1>Contact Young Votta Below</h1>
                    <a href="https://www.facebook.com/yvodzilla" target="_blank">Facebook</a>
                    <p>
                        <label for="firstName">First Name</label><br>
                        <input type="text" name="First Name" id="firstName" autofocus required>
                    </p>
                    <p>
                        <label for="lastName">Last Name</label><br>
                        <input type="text" name="Last Name" id="name" autofocus required>
                    </p>
                    <p>
                        <label for="email">Email</label><br>
                        <input type="email" name="Email" id="email" required>
                    </p>
                    <p>
                        <label for="subject">Subject</label><br>
                        <input type="text" name="Subject" id="subject" required>
                    </p>
                    <p>
                        <label for="message">Message</label><br>
                        <textarea name="Message" id="Message" cols="100" rows="10" required></textarea>
                    </p>
                    <input type="submit" id="send" value="Send">
                    <input type="reset" id="resetForm" value="Reset">
                </form>
            </main>
        
            <footer>
                <!-- Include some sort of footer to display at the bottom of the page -->
